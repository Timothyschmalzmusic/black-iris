<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer petal fills -->
  <g fill="#111" fill-opacity="0.22" stroke="none">
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(0 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(60 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(120 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(180 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(240 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(300 200 200)"/>
  </g>
  <!-- Inner petal fills -->
  <g fill="#111" fill-opacity="0.3" stroke="none">
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(30 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(90 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(150 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(210 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(270 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(330 200 200)"/>
  </g>
  <!-- Center fill -->
  <circle cx="200" cy="200" r="18" fill="#111" fill-opacity="0.35" stroke="none"/>
  <!-- All line detail -->
  <g fill="none" stroke="#111" stroke-width="0.8">
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(0 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(60 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(120 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(180 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(240 200 200)"/>
    <ellipse cx="200" cy="120" rx="38" ry="95" transform="rotate(300 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(30 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(90 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(150 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(210 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(270 200 200)"/>
    <ellipse cx="200" cy="155" rx="22" ry="55" transform="rotate(330 200 200)"/>
    <circle cx="200" cy="200" r="18"/>
    <circle cx="200" cy="200" r="8"/>
  </g>
</svg>
