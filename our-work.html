<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #111111;
    --dark: #1a1a1a;
    --gray: #6b6b6b;
    --mid-gray: #999;
    --light-gray: #b0b0b0;
    --rule: #d4d4d4;
    --faint: #e8e8e8;
    --white: #ffffff;
    --off-white: #fafafa;
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--black);
    line-height: 1.6;
  }

  /* ══════════ NAVIGATION ══════════ */
  .site-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 3rem;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s ease, padding 0.3s ease;
  }
  .site-nav.scrolled {
    border-bottom-color: var(--faint);
    padding: 1rem 3rem;
  }

  .nav-logo {
    font-family: 'Jost', sans-serif;
    font-size: 1.45rem;
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--black);
    text-decoration: none;
    transition: opacity 0.3s ease;
  }
  .nav-logo:hover { opacity: 0.6; }

  .nav-links {
    display: flex;
    gap: 2.2rem;
    list-style: none;
  }
  .nav-links a {
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--light-gray);
    text-decoration: none;
    transition: color 0.3s ease;
  }
  .nav-links a:hover,
  .nav-links a.active { color: var(--black); }

  /* ══════════ HERO ══════════ */
  .hero {
    padding: 10rem 2rem 5rem;
    text-align: center;
  }
  .hero h1 {
    font-family: 'Jost', sans-serif;
    font-size: 2.4rem;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .hero-sub {
    margin-top: 1rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--gray);
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
  }
  .hero-rule {
    width: 48px;
    height: 1px;
    background: var(--black);
    margin: 2rem auto 0;
  }

  /* ══════════ SECTION LAYOUT ══════════ */
  .section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 2rem 3rem;
  }
  .section-label {
    font-family: 'Jost', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--light-gray);
    margin-bottom: 2.5rem;
    text-align: center;
  }

  /* ══════════ POSTER GALLERY ══════════ */
  .poster-grid-wrapper {
    position: relative;
    max-height: 55vh;
    overflow: hidden;
    scroll-snap-type: y proximity;
  }
  .poster-grid-wrapper:hover {
    overflow-y: auto;
  }
  .poster-grid-wrapper::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 4rem;
    background: linear-gradient(transparent, rgba(255,255,255,0.95));
    pointer-events: none;
    z-index: 0;
  }

  .poster-grid-wrapper::-webkit-scrollbar { width: 8px; }
  .poster-grid-wrapper::-webkit-scrollbar-track { background: transparent; }
  .poster-grid-wrapper::-webkit-scrollbar-thumb { background: var(--light-gray); border-radius: 4px; }
  .poster-grid-wrapper::-webkit-scrollbar-thumb:hover { background: var(--gray); }
  .poster-grid-wrapper { scrollbar-width: thin; scrollbar-color: var(--light-gray) transparent; }

  .poster-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    transform: scale(0.85);
    transform-origin: top center;
    margin-bottom: -15%;
  }

  .poster-card {
    position: relative;
    aspect-ratio: 2 / 3;
    overflow: hidden;
    cursor: pointer;
    opacity: 0;
    transform: translateY(24px);
    animation: posterIn 0.7s ease forwards;
    scroll-snap-align: start;
  }

  .poster-card[data-poster] { cursor: pointer; }

  .poster-card[data-poster] .poster-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 110%;
    height: 110%;
    background: rgba(255,255,255,0.95);
    color: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.36s ease;
    z-index: 10;
    text-align: center;
    overflow: visible;
  }

  .poster-card[data-poster].active .poster-overlay {
    opacity: 1;
    pointer-events: auto;
  }

  .poster-overlay h2 {
    font-family: 'Jost', sans-serif;
    font-size: 1.6rem;
    margin-bottom: 0.35rem;
    letter-spacing: 0.08em;
  }

  .poster-credit {
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    color: rgba(0,0,0,0.7);
    margin-bottom: 1.35rem;
    letter-spacing: 0.1em;
  }

  .poster-audio audio { width: 100%; outline: none; }

  .poster-video { width: 100%; max-width: 600px; margin: 0 auto; }
  .poster-video video { border-radius: 4px; }

  @keyframes posterIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes posterFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .poster-bg {
    position: absolute;
    inset: 0;
    transition: background 0.36s ease;
  }
  .poster-card:hover .poster-bg { transform: scale(1.04); }
  .poster-card.active .poster-bg { background: white; }

  .poster-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.36s ease;
  }
  .poster-card.active .poster-bg img { opacity: 0; }

  .poster-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 2rem 1.5rem;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.6) 100%);
    transition: background 0.5s ease;
  }
  .poster-card:hover .poster-content {
    background: linear-gradient(180deg, transparent 20%, rgba(0,0,0,0.7) 100%);
  }

  .poster-type {
    position: absolute;
    top: 1.5rem;
    left: 1.5rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    transition: color 0.4s ease;
  }
  .poster-card:hover .poster-type { color: rgba(255,255,255,0.6); }

  .poster-title {
    font-family: 'Jost', sans-serif;
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.9);
    line-height: 1.2;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  .poster-year {
    font-family: 'Jost', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    margin-bottom: 0.8rem;
  }

  .poster-desc {
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem;
    font-style: italic;
    line-height: 1.7;
    color: rgba(255,255,255,0.55);
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.5s ease, opacity 0.4s ease;
  }
  .poster-card:hover .poster-desc { max-height: 80px; opacity: 1; }

  .poster-rule {
    width: 28px;
    height: 1px;
    background: rgba(255,255,255,0.25);
    margin-bottom: 0.8rem;
    transition: width 0.5s ease;
  }
  .poster-card:hover .poster-rule { width: 48px; }

  /* ══════════ AUDIO REEL ══════════ */
  .reel-section {
    background: var(--off-white);
    border-top: 1px solid var(--faint);
    border-bottom: 1px solid var(--faint);
    margin-top: -2rem;
  }

  .reel-list {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }

  .reel-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--faint);
    cursor: pointer;
    transition: opacity 0.2s ease;
  }
  .reel-item:last-child { border-bottom: none; }
  .reel-item:hover { opacity: 0.7; }

  .reel-link {
    display: block;
    padding: 1.2rem 0;
    color: var(--gray);
    text-decoration: none;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    text-align: center;
    text-transform: uppercase;
    position: relative;
    transition: color 0.3s ease;
  }
  .reel-link::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 1px;
    background-color: var(--black);
    transition: width 0.3s ease, left 0.3s ease;
  }
  .reel-link:hover::after { width: 100%; left: 0; }
  .reel-link:hover { color: var(--black); }

  .reel-play-btn {
    width: 32px;
    height: 32px;
    min-width: 32px;
    border: 1px solid var(--rule);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .reel-play-btn:hover { border-color: var(--black); }
  .reel-play-btn svg {
    width: 12px;
    height: 12px;
    fill: var(--gray);
    margin-left: 1px;
    transition: fill 0.3s ease;
  }
  .reel-play-btn:hover svg { fill: var(--black); }
  .reel-play-btn.playing {
    border-color: var(--black);
    background: var(--black);
  }
  .reel-play-btn.playing svg { fill: var(--white); margin-left: 0; }

  .reel-info { flex: 1; min-width: 0; }

  .reel-title {
    font-family: 'Jost', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.04em;
  }
  .reel-subtitle {
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--light-gray);
    margin-top: 0.1rem;
  }
  .reel-duration {
    font-size: 0.6rem;
    color: var(--light-gray);
    letter-spacing: 0.05em;
    min-width: 2.8rem;
    text-align: right;
  }

  .reel-progress {
    width: 100%;
    height: 2px;
    background: var(--faint);
    margin-top: 0.5rem;
    border-radius: 1px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .reel-item.active .reel-progress { opacity: 1; }

  .reel-progress-bar {
    height: 100%;
    background: var(--black);
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ══════════ FOOTER ══════════ */
  .site-footer {
    text-align: center;
    padding: 4rem 2rem;
    border-top: 1px solid var(--faint);
  }
  .footer-logo {
    font-family: 'Jost', sans-serif;
    font-size: 1.2rem;
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--black);
    text-decoration: none;
  }
  .footer-copy {
    margin-top: 0.8rem;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--light-gray);
  }

  /* ══════════ RESPONSIVE ══════════ */
  @media (max-width: 900px) {
    .poster-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
  }

  @media (max-width: 768px) {
    .site-nav { padding: 1.2rem 1.5rem; }
    .site-nav.scrolled { padding: 0.8rem 1.5rem; }
    .nav-logo { font-size: 0.9rem; }
    .hero { padding: 8rem 1.5rem 3.5rem; }
    .hero h1 { font-size: 1.8rem; }
    .section { padding: 3rem 1.5rem; }
    .poster-title { font-size: 1.4rem; }
    .poster-desc { font-size: 0.7rem; }
  }

  @media (max-width: 540px) {
    .poster-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      transform: scale(1);
      max-width: 100%;
      margin: 0 auto;
    }
    .poster-card[data-poster] .poster-overlay { padding: 0.6rem; }
    .poster-overlay h2 { font-size: 0.75rem; margin-bottom: 0.15rem; }
    .poster-credit { font-size: 0.45rem; margin-bottom: 0.5rem; }
    .reel-item { gap: 0.3rem; padding: 0.35rem 0; }
    .reel-play-btn { width: 20px; height: 20px; min-width: 20px; }
    .reel-play-btn svg { width: 8px; height: 8px; }
    .reel-title { font-size: 0.5rem; }
    .reel-subtitle { font-size: 0.35rem; margin-top: 0; }
    .reel-duration { font-size: 0.35rem; min-width: 1.5rem; }
    .reel-progress { margin-top: 0.2rem; }
    .nav-links { gap: 1.4rem; }
    .nav-links a { font-size: 0.58rem; letter-spacing: 0.2em; }
  }
</style>
</head>

// ╔═══════════════════════════════════════════════════════════════════════╗
// ║  GALLERY RENDERER — No need to edit below when adding projects.     ║
// ╚═══════════════════════════════════════════════════════════════════════╝

const PLAY_SVG = '<svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>';
const PAUSE_SVG = '<svg viewBox="0 0 24 24"><rect x="7" y="5" width="3" height="14" fill="currentColor"/><rect x="14" y="5" width="3" height="14" fill="currentColor"/></svg>';

function buildReelItemHTML(track) {
  return `
    <div class="reel-item" data-track="${track.id}">
      <button class="reel-play-btn" aria-label="Play">${PLAY_SVG}</button>
      <div class="reel-info">
        <div class="reel-title">${track.title}</div>
        <div class="reel-subtitle">${track.subtitle}</div>
        <div class="reel-progress"><div class="reel-progress-bar"></div></div>
      </div>
      <span class="reel-duration">${track.duration}</span>
    </div>`;
}

function buildPosterCard(project, index) {
  const hasMedia = (project.tracks && project.tracks.length) || (project.videos && project.videos.length);
  const dataPoster = hasMedia ? ` data-poster="${project.id}"` : '';
  const delay = Math.min((index + 1) * 0.1, 0.9);

  let overlayHTML = '';
  if (hasMedia) {
    let mediaHTML = '';

    if (project.tracks && project.tracks.length) {
      mediaHTML = '<div class="poster-audio">' + project.tracks.map(buildReelItemHTML).join('') + '</div>';
    }
    if (project.videos && project.videos.length) {
      mediaHTML = project.videos.map(function(v) {
        return '<div class="poster-video">' +
          '<video width="100%" height="auto" controls style="max-width: ' + (v.maxWidth || '400px') + ';">' +
          '<source src="' + v.src + '" type="video/mp4">' +
          'Your browser does not support the video tag.' +
          '</video></div>';
      }).join('');
    }

    overlayHTML =
      '<div class="poster-overlay" aria-hidden="true">' +
      '<h2>' + project.title + '</h2>' +
      '<p class="poster-credit">' + project.credit + '</p>' +
      mediaHTML +
      '</div>';
  }

  return '<div class="poster-card"' + dataPoster + ' style="animation-delay: ' + delay + 's;">' +
    '<div class="poster-bg"><img src="' + project.poster + '" alt="' + project.alt + '" loading="lazy"></div>' +
    overlayHTML +
    '</div>';
}

// Build poster grid
var posterGrid = document.getElementById('posterGrid');
posterGrid.innerHTML = PROJECTS.map(buildPosterCard).join('');

// Build selected cues reel
var reelList = document.getElementById('reelList');
reelList.innerHTML = SELECTED_CUES.map(buildReelItemHTML).join('');

// ── Audio engine ──────────────────────────────────────────────
var allTracks = [];
PROJECTS.forEach(function(p) {
  if (p.tracks) allTracks.push.apply(allTracks, p.tracks);
});
allTracks.push.apply(allTracks, SELECTED_CUES);

var audioElements = {};
allTracks.forEach(function(track) {
  var audio = document.createElement('audio');
  audio.id = 'audio-' + track.id;
  audio.preload = 'none';
  audio.src = track.src;
  document.body.appendChild(audio);
  audioElements[track.id] = audio;
});

var activeItem = null;
var activeAudio = null;
var updateInterval = null;

function stopPlayback() {
  if (activeAudio) activeAudio.pause();
  if (activeItem) {
    activeItem.classList.remove('active');
    var btn = activeItem.querySelector('.reel-play-btn');
    btn.classList.remove('playing');
    btn.innerHTML = PLAY_SVG;
    activeItem.querySelector('.reel-progress-bar').style.width = '0%';
  }
  if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
  activeItem = null;
  activeAudio = null;
}

document.addEventListener('click', function(e) {
  var btn = e.target.closest('.reel-play-btn');
  if (!btn) return;

  e.preventDefault();
  e.stopPropagation();

  var item = btn.closest('.reel-item');
  var trackId = item.getAttribute('data-track');
  var audio = audioElements[trackId];

  if (activeItem === item) {
    stopPlayback();
    return;
  }

  stopPlayback();
  activeItem = item;
  activeAudio = audio;
  item.classList.add('active');
  btn.classList.add('playing');
  btn.innerHTML = PAUSE_SVG;

  var bar = item.querySelector('.reel-progress-bar');
  if (audio) {
    audio.currentTime = 0;
    audio.play().catch(function(err) { console.log('Audio play failed:', err); });

    updateInterval = setInterval(function() {
      if (audio.duration) {
        bar.style.width = (audio.currentTime / audio.duration) * 100 + '%';
      }
      if (audio.ended) stopPlayback();
    }, 100);

    audio.addEventListener('ended', function() {
      if (activeItem === item) stopPlayback();
    }, { once: true });
  }
});

// ── Poster overlay interactions (single generic handler) ──────
var IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

if (IS_TOUCH) {
  document.addEventListener('click', function(e) {
    var card = e.target.closest('.poster-card[data-poster]');
    if (!card) return;
    if (e.target.closest('.reel-play-btn') || e.target.closest('video')) return;

    e.preventDefault();
    var overlay = card.querySelector('.poster-overlay');
    var isActive = card.classList.contains('active');

    card.classList.toggle('active', !isActive);
    overlay.setAttribute('aria-hidden', isActive ? 'true' : 'false');
    overlay.style.animation = isActive
      ? 'posterFade 0.36s ease reverse'
      : 'posterFade 0.36s ease forwards';
  });
} else {
  document.querySelectorAll('.poster-card[data-poster]').forEach(function(card) {
    var overlay = card.querySelector('.poster-overlay');

    card.addEventListener('mouseenter', function() {
      card.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
      overlay.style.animation = 'posterFade 0.36s ease forwards';
    });

    card.addEventListener('mouseleave', function() {
      card.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
      overlay.style.animation = 'posterFade 0.36s ease reverse';
    });
  });
}

// ── Nav scroll ────────────────────────────────────────────────
var nav = document.getElementById('siteNav');
window.addEventListener('scroll', function() {
  nav.classList.toggle('scrolled', window.scrollY > 40);
});
